<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>500 — Server Error · CodeMed Group</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080D;color:#E2E8F0;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(#1E2435 1px,transparent 1px),linear-gradient(90deg,#1E2435 1px,transparent 1px);background-size:48px 48px;opacity:.25;pointer-events:none}
.code{font-family:'JetBrains Mono',monospace;font-size:96px;font-weight:500;color:#1E2435;letter-spacing:-4px;margin-bottom:8px;position:relative;z-index:1}
.code span{color:#EF4444}
h1{font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:10px;position:relative;z-index:1}
p{font-size:14px;color:#64748B;margin-bottom:28px;position:relative;z-index:1;max-width:400px;line-height:1.6}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
a{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:7px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;text-decoration:none;transition:all .15s}
.primary{background:#2563EB;color:#fff}
.primary:hover{background:#1D4ED8;box-shadow:0 0 20px rgba(37,99,235,.4)}
.ghost{background:transparent;color:#94A3B8;border:1px solid #1E2435}
.ghost:hover{background:#111520;color:#E2E8F0}
.status{margin-top:28px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#334155;position:relative;z-index:1}
</style>
</head>
<body>
<div class="code">5<span>0</span>0</div>
<h1>Something went wrong</h1>
<p>An unexpected error occurred on our end. Our team has been notified. Please try again in a moment — if the issue persists, contact support.</p>
<div class="actions">
  <a href="/dashboard" class="primary">← Back to Dashboard</a>
  <a href="/contact" class="ghost">Contact Support</a>
  <a href="/api/v1/status" class="ghost" target="_blank">API Status</a>
</div>
<div class="status">● All systems are monitored continuously</div>
</body>
</html>
